# pytest.ini
# Pytest Configuration for MAVSDK Drone Show
# ==========================================

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.10

# Output options - verbose with short traceback
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov=gcs-server
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-fail-under=10
    --timeout=60
    --timeout_method=thread

# Test markers for categorization
markers =
    unit: Fast unit tests (no external dependencies)
    integration: Integration tests (may use SITL or network)
    slow: Slow running tests (>10 seconds)
    websocket: WebSocket endpoint tests
    http: HTTP endpoint tests
    coordinator: Tests for coordinator.py startup/shutdown
    mission: Tests for mission execution (drone_setup.py)
    command: Tests for command processing
    telemetry: Tests for telemetry handling
    swarm: Tests for swarm coordination (50+ drones)
    load: Load/performance tests
    smoke: Quick smoke tests for CI

# Async test configuration
asyncio_mode = auto

# Default timeout for tests (seconds)
timeout = 60

# Test execution order (for load tests)
# Run unit tests first, then integration
# This is overridable with pytest-ordering markers

# Logging configuration for tests
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Disable network access by default (override with markers)
# This helps catch tests that accidentally make real HTTP calls
